name: Build and Release BGMI TDM Mod

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Mod JAR
        run: ./gradlew build --no-daemon

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgmitdm-mod-jar
          path: build/libs/*.jar
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Mod JAR
        run: ./gradlew build --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "BGMI TDM Mod ${{ github.ref_name }}"
          body: |
            ## BGMI TDM Mod ${{ github.ref_name }}

            ### Installation
            1. Download `bgmitdm-1.0.0.jar` below
            2. Place in `.minecraft/mods/` folder
            3. Make sure **Forge 1.20.1** is installed
            4. Launch Minecraft!

            ### How to Play
            - `/tdm map generate` - Generate the map
            - `/tdm join red` or `/tdm join blue` - Join a team
            - `/tdm start` - Start the match!

            ### Requirements
            - Minecraft Java 1.20.1
            - Forge 1.20.1
          files: build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
